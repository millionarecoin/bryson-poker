<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bryson Poker Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }

    h1, h2 {
      color: #38bdf8;
      margin-bottom: 8px;
    }

    .meta {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
      background: #020617;
    }

    th, td {
      padding: 10px;
      border: 1px solid #1e293b;
      text-align: left;
    }

    th {
      background: #020617;
      color: #7dd3fc;
    }

    tr:nth-child(even) {
      background: #020617;
    }

    .positive {
      color: #4ade80;
      font-weight: bold;
    }

    .negative {
      color: #f87171;
      font-weight: bold;
    }

    .section {
      margin-top: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 880px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Bryson Poker Dashboard</h1>
    <div class="meta">Everyday and every week, place leaderboard files in the <strong>outputs/</strong> folder.</div>
  </header>

  <!-- Pages uses static files from outputs/; populate tables manually or via script -->

  <main>
    <div id="leaderboard-content">
      <p>Loading leaderboard data...</p>
    </div>
  </main>

  <script>


    // Auto-discover latest JSON file in /outputs/ (requires /outputs/ to be HTTP-accessible and directory listing enabled)

    // Always fetch the latest JSON file (no directory listing required)
    const LATEST_JSON = '/outputs/splitwise_leaderboard_latest.json';

    function renderTable(title, rows, columns) {
      if (!rows.length) return '';
      let thead = '<thead><tr>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr></thead>';
      let tbody = '<tbody>' + rows.map(row =>
        '<tr>' + columns.map(c => `<td>${row[c] ?? ''}</td>`).join('') + '</tr>'
      ).join('') + '</tbody>';
      return `<section class="section"><h2>${title}</h2><table>${thead}${tbody}</table></section>`;
    }

    async function loadLeaderboard() {
      const container = document.getElementById('leaderboard-content');
      const jsonUrl = LATEST_JSON;
      try {
        const resp = await fetch(jsonUrl);
        if (!resp.ok) throw new Error('Not found');
        const data = await resp.json();
        let html = '';
        // All-Time Leaderboard (from 2024) at the top
      //  if (data.alltime && Array.isArray(data.alltime) && data.alltime.length > 0) {
       //   html += renderTable('All-Time Leaderboard (from 2024)', data.alltime, ['rank', 'player', 'winnings']);
       // }
        html += renderTable('Yearly Leaderboard', data.yearly, ['rank', 'player', 'winnings']);
        html += renderTable('Weekly Winners', data.weekly_winners, ['week_label', 'winner', 'top_winnings']);
        html += renderTable('Weekly Totals', data.weekly, ['week_label', 'week_rank', 'player', 'winnings']);
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<p>Error loading leaderboard data from <strong>${jsonUrl}</strong>.</p>`;
      }
    }
    window.addEventListener('DOMContentLoaded', loadLeaderboard);
  </script>

  <footer>
    <div>Repository: bryson-poker</div>
  </footer>

</body>
</html>
